<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在留カード情報 抽出ツール</title>
    <!-- Tailwind CSSを使用してモダンなUIを構築 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Excel出力用ライブラリ (SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* カスタム通知用のスタイル */
        #notification {
            transition: opacity 0.3s ease-in-out, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .notification-hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .notification-visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- ヘッダー (Material Card) -->
        <header class="bg-white rounded-2xl shadow-sm p-6 sm:p-8 border border-slate-100 text-center relative overflow-hidden">
            <!-- 上部のアクセントカラー帯 -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-slate-600"></div>
            
            <h1 class="text-2xl font-bold text-slate-800 flex items-center justify-center gap-2 mt-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                在留カード情報 抽出ツール
            </h1>
            <p class="text-sm text-slate-500 mt-3">在留カードの画像（表面・裏面）をアップロードして、テキストデータを抽出・コピーします。</p>
        </header>

        <!-- 画像アップロード機能 (Material Card) -->
        <div class="bg-white rounded-2xl shadow-sm p-6 sm:p-8 border border-slate-100 relative">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                <!-- 表面アップロード -->
                <label id="dropZoneFront" class="block p-8 border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50/50 text-center relative hover:bg-slate-100/80 hover:border-slate-400 transition-colors cursor-pointer group">
                    <input type="file" id="fileFront" accept=".jpg, .jpeg, .png, .pdf" class="hidden">
                    <div class="text-md font-medium text-slate-700 mb-2 transition-transform group-hover:-translate-y-1">
                        <div class="bg-white w-14 h-14 mx-auto rounded-full flex items-center justify-center shadow-sm mb-3 border border-slate-100 group-hover:shadow-md transition-shadow">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                        </div>
                        表面の画像（必須）
                        <!-- 対応ファイル形式の色付きバッジ -->
                        <div class="flex justify-center flex-wrap gap-1.5 mt-2.5 mb-1">
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 border border-blue-200">JPG</span>
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 border border-blue-200">JPEG</span>
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-teal-100 text-teal-700 border border-teal-200">PNG</span>
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-rose-100 text-rose-700 border border-rose-200">PDF</span>
                        </div>
                    </div>
                    <p id="fileNameFront" class="text-xs text-slate-500 font-medium break-words px-2">クリックまたはドラッグ＆ドロップ</p>
                </label>

                <!-- 裏面アップロード -->
                <label id="dropZoneBack" class="block p-8 border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50/50 text-center relative hover:bg-slate-100/80 hover:border-slate-400 transition-colors cursor-pointer group">
                    <input type="file" id="fileBack" accept=".jpg, .jpeg, .png, .pdf" class="hidden">
                    <div class="text-md font-medium text-slate-600 mb-2 transition-transform group-hover:-translate-y-1">
                        <div class="bg-white w-14 h-14 mx-auto rounded-full flex items-center justify-center shadow-sm mb-3 border border-slate-100 group-hover:shadow-md transition-shadow">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                        </div>
                        裏面の画像（任意）
                        <!-- 対応ファイル形式の色付きバッジ -->
                        <div class="flex justify-center flex-wrap gap-1.5 mt-2.5 mb-1 opacity-70">
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 border border-blue-200">JPG</span>
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 border border-blue-200">JPEG</span>
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-teal-100 text-teal-700 border border-teal-200">PNG</span>
                            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-rose-100 text-rose-700 border border-rose-200">PDF</span>
                        </div>
                    </div>
                    <p id="fileNameBack" class="text-xs text-slate-500 font-medium break-words px-2">変更がある場合のみ追加</p>
                </label>
            </div>

            <!-- Material ElevatedButton -->
            <button id="extractBtn" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-medium py-3.5 rounded-xl shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" />
                </svg>
                データ抽出を実行
            </button>
            
            <div id="loadingIndicator" class="hidden absolute inset-0 bg-white/95 flex flex-col justify-center items-center rounded-2xl z-10 m-2 backdrop-blur-sm">
                <svg class="animate-spin h-10 w-10 text-slate-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-sm text-slate-700 font-medium tracking-widest uppercase">Processing...</span>
            </div>
        </div>

        <!-- 抽出データ表示エリア (Material Card) -->
        <div class="bg-white rounded-2xl shadow-sm p-6 sm:p-8 border border-slate-100">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-100 pb-5 mb-5 gap-4">
                <div>
                    <h2 class="text-xl font-semibold text-slate-800 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        抽出結果
                    </h2>
                </div>
                
                <div class="flex gap-3 w-full sm:w-auto">
                    <!-- クリアボタン -->
                    <button onclick="clearData()" class="bg-white hover:bg-rose-50 text-rose-600 border border-rose-200 text-sm font-medium px-4 py-2.5 rounded-lg shadow-sm hover:shadow-md active:scale-[0.97] transition-all flex items-center justify-center gap-2 flex-1 sm:flex-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        クリア
                    </button>
                    <!-- 落ち着いたティール（青緑）のボタン -->
                    <button onclick="exportToExcel()" class="bg-teal-700 hover:bg-teal-800 text-white text-sm font-medium px-5 py-2.5 rounded-lg shadow-sm hover:shadow-md active:scale-[0.97] transition-all flex items-center justify-center gap-2 flex-1 sm:flex-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                        Excel保存
                    </button>
                </div>
            </div>
            
            <!-- 抽出データが入るコンテナ -->
            <div id="resultContainer" class="bg-slate-50/50 rounded-xl p-2 sm:p-4">
                <!-- JSで動的に追加されます -->
            </div>
        </div>
    </div>

    <!-- 通知用トーストメッセージ (Material Snackbar風) -->
    <div id="notification" class="fixed bottom-6 left-1/2 -translate-x-1/2 md:left-auto md:-translate-x-0 md:right-6 bg-slate-800 text-slate-50 px-6 py-3.5 rounded-xl shadow-lg notification-hidden flex items-center gap-3 z-50 min-w-[280px]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-400 shrink-0" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <span id="notificationText" class="text-sm font-medium tracking-wide">コピーしました</span>
    </div>

    <!-- カスタム確認モーダル -->
    <div id="confirmModal" class="fixed inset-0 bg-slate-900/40 hidden flex justify-center items-center z-50 backdrop-blur-sm transition-opacity opacity-0 duration-200">
        <div class="bg-white rounded-2xl shadow-xl p-6 w-11/12 max-w-sm transform scale-95 transition-transform duration-200" id="confirmModalContent">
            <h3 class="text-lg font-bold text-slate-800 mb-2">クリアの確認</h3>
            <p class="text-sm text-slate-600 mb-6">抽出したデータと選択した画像をすべてクリアしますか？</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeConfirmModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">キャンセル</button>
                <button onclick="executeClear()" class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-rose-600 hover:bg-rose-700 transition-colors shadow-sm">クリアする</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // APIキーは実行環境から提供されます

        // 日付文字列から年・月・日を抽出する関数
        function extractDateParts(dateStr) {
            if (!dateStr || dateStr === '-') return { year: '-', month: '-', day: '-' };
            // YYYY-MM-DD や YYYY/MM/DD、YYYY年MM月DD日 に対応
            const match = dateStr.match(/(\d{4})[-\/年](\d{1,2})[-\/月](\d{1,2})/);
            if (match) {
                return {
                    year: match[1],
                    month: match[2],
                    day: match[3]
                };
            }
            return { year: '-', month: '-', day: '-' };
        }

        // 日付を必ず YYYY/MM/DD 形式に統一する関数
        function formatDateToSlash(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            const match = dateStr.match(/(\d{4})[-\/年](\d{1,2})[-\/月](\d{1,2})/);
            if (match) {
                const y = match[1];
                const m = String(match[2]).padStart(2, '0');
                const d = String(match[3]).padStart(2, '0');
                return `${y}/${m}/${d}`;
            }
            return dateStr;
        }

        // 現在表示されているデータを保持するオブジェクト
        let currentData = {
            name: 'HOANG THI PHUONG THAO',
            cardNumber: 'NP97438749EC',
            nationality: 'ベトナム',
            gender: '女',
            birthDate: '1997/10/09',
            birthYear: '1997',
            birthMonth: '10',
            birthDay: '09',
            address: '群馬県伊勢崎市今泉町二丁目934番地2 カモミール今泉102',
            status: '技術・人文知識・国際業務',
            workRestriction: '在留資格に基づく就労活動のみ可',
            periodOfStay: '3年',
            expiryDate: '2026/05/19',
            permitType: '在留期間更新許可',
            permitDate: '2023/04/14',
            issueDate: '2023/04/14'
        };

        // ページ読み込み時に初期データを画面に反映
        document.addEventListener('DOMContentLoaded', () => {
            renderResult();
        });

        // --- 画像・PDF OCR (Gemini API) 処理 ---
        const fileFront = document.getElementById('fileFront');
        const fileBack = document.getElementById('fileBack');
        const dropZoneFront = document.getElementById('dropZoneFront');
        const dropZoneBack = document.getElementById('dropZoneBack');
        const fileNameFront = document.getElementById('fileNameFront');
        const fileNameBack = document.getElementById('fileNameBack');
        const extractBtn = document.getElementById('extractBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');

        function updateFileName(input, displayElement, defaultText) {
            if (input.files && input.files.length > 0) {
                displayElement.textContent = input.files[0].name;
                displayElement.classList.add('text-slate-800');
                displayElement.closest('label').classList.add('border-slate-500', 'bg-slate-100/50');
            } else {
                displayElement.textContent = defaultText;
                displayElement.classList.remove('text-slate-800');
                displayElement.closest('label').classList.remove('border-slate-500', 'bg-slate-100/50');
            }
        }

        fileFront.addEventListener('change', () => updateFileName(fileFront, fileNameFront, 'クリックまたはドラッグ＆ドロップ'));
        fileBack.addEventListener('change', () => updateFileName(fileBack, fileNameBack, '変更がある場合のみ追加'));

        function setupDropZone(dropZone, fileInput, displayElement, defaultText) {
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('bg-slate-200/50', 'border-slate-400');
            });
            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('bg-slate-200/50', 'border-slate-400');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('bg-slate-200/50', 'border-slate-400');
                if (e.dataTransfer.files.length) {
                    fileInput.files = e.dataTransfer.files;
                    updateFileName(fileInput, displayElement, defaultText);
                }
            });
        }

        setupDropZone(dropZoneFront, fileFront, fileNameFront, 'クリックまたはドラッグ＆ドロップ');
        setupDropZone(dropZoneBack, fileBack, fileNameBack, '変更がある場合のみ追加');

        extractBtn.addEventListener('click', async () => {
            if (!fileFront.files || fileFront.files.length === 0) {
                showNotification('表面の画像を選択してください', true);
                return;
            }

            loadingIndicator.classList.remove('hidden');

            try {
                const parts = [];
                
                const promptText = `提供された画像は日本の在留カードです。表面（必須）、および裏面（ある場合）の情報を読み取り、以下の情報を抽出しJSON形式で出力してください。読み取れない項目は空文字にしてください。
                - name: 氏名 (英字表記)
                - cardNumber: 在留カード番号 (右上などにある英数字12桁)
                - nationality: 国籍・地域
                - gender: 性別 (男 または 女)
                - birthDate: 生年月日 (YYYY/MM/DD形式に変換。例: 1990年01月01日 -> 1990/01/01)
                - address: 住居地（表面の「住居地」の住所。ただし裏面の画像が提供されており、裏面の「住居地記載欄」に新しい住所が追記されている場合は、裏面の一番最新の住所を優先して抽出してください）
                - status: 在留資格
                - workRestriction: 就労制限の有無 (例: 「就労不可」「在留資格に基づく就労活動のみ可」など)
                - periodOfStay: 在留期間 (例: 「3年」「1年」など)
                - expiryDate: 在留期間満了日 (YYYY/MM/DD形式に変換。例: 2026年05月19日 -> 2026/05/19)
                - permitType: 許可の種類 (表面下部にある「許可の種類」欄の記載。例: 「在留期間更新許可」「在留資格変更許可」など)
                - permitDate: 許可年月日 (YYYY/MM/DD形式に変換)
                - issueDate: 交付年月日 (YYYY/MM/DD形式に変換)`;

                parts.push({ text: promptText });

                const frontBase64Data = await readFileAsBase64(fileFront.files[0]);
                parts.push({ inlineData: { mimeType: fileFront.files[0].type, data: frontBase64Data.split(',')[1] } });

                if (fileBack.files && fileBack.files.length > 0) {
                    const backBase64Data = await readFileAsBase64(fileBack.files[0]);
                    parts.push({ inlineData: { mimeType: fileBack.files[0].type, data: backBase64Data.split(',')[1] } });
                }

                const payload = {
                    contents: [{ role: "user", parts: parts }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                name: { type: "STRING" },
                                cardNumber: { type: "STRING" },
                                nationality: { type: "STRING" },
                                gender: { type: "STRING" },
                                birthDate: { type: "STRING" },
                                address: { type: "STRING" },
                                status: { type: "STRING" },
                                workRestriction: { type: "STRING" },
                                periodOfStay: { type: "STRING" },
                                expiryDate: { type: "STRING" },
                                permitType: { type: "STRING" },
                                permitDate: { type: "STRING" },
                                issueDate: { type: "STRING" }
                            }
                        }
                    }
                };

                const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    const extracted = JSON.parse(text);
                    const bDate = formatDateToSlash(extracted.birthDate || '-');
                    const bParts = extractDateParts(bDate);

                    currentData = {
                        name: extracted.name || '-',
                        cardNumber: extracted.cardNumber || '-',
                        nationality: extracted.nationality || '-',
                        gender: extracted.gender || '-',
                        birthDate: bDate,
                        birthYear: bParts.year,
                        birthMonth: bParts.month,
                        birthDay: bParts.day,
                        address: extracted.address || '-',
                        status: extracted.status || '-',
                        workRestriction: extracted.workRestriction || '-',
                        periodOfStay: extracted.periodOfStay || '-',
                        expiryDate: formatDateToSlash(extracted.expiryDate || '-'),
                        permitType: extracted.permitType || '-',
                        permitDate: formatDateToSlash(extracted.permitDate || '-'),
                        issueDate: formatDateToSlash(extracted.issueDate || '-')
                    };

                    renderResult();
                    showNotification('データの抽出が完了しました。');
                } else {
                    throw new Error("解析結果が空です");
                }
            } catch (error) {
                console.error(error);
                showNotification('解析に失敗しました。画像を確認してください。', true);
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        });

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // 抽出結果を描画する関数
        function renderResult() {
            const container = document.getElementById('resultContainer');
            
            if (!currentData) {
                container.innerHTML = `<div class="text-center text-slate-400 py-10 font-medium">データがありません。<br>画像をアップロードして抽出を実行してください。</div>`;
                return;
            }

            const fields = [
                { key: 'name', label: '氏名', colSpan: 'sm:col-span-2' },
                { key: 'cardNumber', label: '在留カード番号', font: 'font-mono uppercase tracking-wide' },
                { key: 'nationality', label: '国籍・地域' },
                { key: 'gender', label: '性別' },
                { key: 'birthDate', label: '生年月日' },
                { key: 'address', label: '住居地', colSpan: 'sm:col-span-2' },
                { key: 'status', label: '在留資格' },
                { key: 'workRestriction', label: '就労制限の有無', colSpan: 'sm:col-span-2' },
                { key: 'periodOfStay', label: '在留期間' },
                { key: 'expiryDate', label: '在留期間満了日' },
                { key: 'permitType', label: '許可の種類', colSpan: 'sm:col-span-2' },
                { key: 'permitDate', label: '許可年月日' },
                { key: 'issueDate', label: '交付年月日' }
            ];

            let html = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 text-sm">`;
            
            fields.forEach(field => {
                const value = currentData[field.key];
                const safeValue = escapeHtml(value).replace(/'/g, "\\'");
                const fontClass = field.font || '';
                const colSpanClass = field.colSpan || '';

                let extraButtons = '';
                // 生年月日の場合のみ、年・月・日の個別コピーボタンを追加
                if (field.key === 'birthDate') {
                    const year = escapeHtml(currentData.birthYear).replace(/'/g, "\\'");
                    const month = escapeHtml(currentData.birthMonth).replace(/'/g, "\\'");
                    const day = escapeHtml(currentData.birthDay).replace(/'/g, "\\'");
                    extraButtons = `
                        <div class="flex gap-2 mt-2">
                            <button onclick="copySingleItem('${year}', '生年')" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded transition-colors" title="年をコピー">年のみ</button>
                            <button onclick="copySingleItem('${month}', '生月')" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded transition-colors" title="月をコピー">月のみ</button>
                            <button onclick="copySingleItem('${day}', '生日')" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded transition-colors" title="日をコピー">日のみ</button>
                        </div>
                    `;
                }

                html += `
                    <div class="${colSpanClass} bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-start group hover:shadow-md hover:border-slate-200 transition-all">
                        <div class="overflow-hidden mr-3 w-full">
                            <span class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">${field.label}</span>
                            <span class="block text-base font-medium text-slate-700 ${fontClass} truncate" title="${escapeHtml(value)}">${escapeHtml(value)}</span>
                            ${extraButtons}
                        </div>
                        <button onclick="copySingleItem('${safeValue}', '${field.label}')" class="text-slate-300 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-2.5 rounded-lg transition-colors shrink-0 mt-1" title="${field.label}をコピー">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                        </button>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function copySingleItem(text, itemName) {
            fallbackCopyTextToClipboard(text, itemName);
        }

        // --- クリア処理（カスタムモーダル） ---
        function clearData() {
            const modal = document.getElementById('confirmModal');
            const content = document.getElementById('confirmModalContent');
            modal.classList.remove('hidden');
            // アニメーションのため少しだけ遅延させる
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            });
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirmModal');
            const content = document.getElementById('confirmModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        function executeClear() {
            closeConfirmModal();
            currentData = null;
            
            // ファイル選択枠をリセット
            fileFront.value = '';
            fileBack.value = '';
            updateFileName(fileFront, fileNameFront, 'クリックまたはドラッグ＆ドロップ');
            updateFileName(fileBack, fileNameBack, '変更がある場合のみ追加');
            
            renderResult();
            showNotification('データをクリアしました');
        }

        // Excelファイル（.xlsx）として出力 (テキストのみ・縦型形式)
        function exportToExcel() {
            if (!currentData || Object.keys(currentData).length === 0) {
                showNotification('出力するデータがありません', true);
                return;
            }

            // ファイル名の生成: 氏名_年月日時分秒
            const name = currentData.name ? currentData.name.replace(/ /g, '_') : 'Unknown';
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timestamp = `${year}${month}${day}${hours}${minutes}${seconds}`;
            const filename = `${name}_${timestamp}.xlsx`;

            // 出力データの準備 (年・月・日の列を追加)
            const keys = [
                'name', 'cardNumber', 'nationality', 'gender', 
                'birthDate', 'birthYear', 'birthMonth', 'birthDay', 
                'address', 'status', 'workRestriction', 'periodOfStay', 
                'expiryDate', 'permitType', 'permitDate', 'issueDate'
            ];
            const labels = [
                '氏名', 'カード番号', '国籍・地域', '性別', 
                '生年月日', '生年', '生月', '生日', 
                '住居地', '在留資格', '就労制限の有無', '在留期間', 
                '満了日', '許可の種類', '許可年月日', '交付年月日'
            ];

            // A列に項目名、B列にデータを配置する縦型形式に変更
            const worksheetData = labels.map((label, index) => {
                return [label, currentData[keys[index]] || '-'];
            });

            try {
                // SheetJSを使用してExcelファイルを生成
                const ws = XLSX.utils.aoa_to_sheet(worksheetData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "在留カード情報");
                
                // ダウンロード実行
                XLSX.writeFile(wb, filename);
                showNotification('Excelファイルをダウンロードしました');
            } catch (error) {
                console.error("Excel出力エラー:", error);
                showNotification('Excelファイルの作成に失敗しました', true);
            }
        }

        function fallbackCopyTextToClipboard(text, successMsg) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showNotification(`${successMsg}をコピーしました`);
                } else {
                    showNotification('コピーに失敗しました', true);
                }
            } catch (err) {
                showNotification('ブラウザがコピーに対応していません', true);
            }

            document.body.removeChild(textArea);
        }

        let notificationTimeout;
        function showNotification(message, isError = false) {
            const notif = document.getElementById('notification');
            const text = document.getElementById('notificationText');
            const icon = notif.querySelector('svg');
            
            text.innerText = message;
            
            if (isError) {
                icon.classList.remove('text-teal-400');
                icon.classList.add('text-rose-400');
            } else {
                icon.classList.remove('text-rose-400');
                icon.classList.add('text-teal-400');
            }

            notif.classList.remove('notification-hidden');
            notif.classList.add('notification-visible');
            
            clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => {
                notif.classList.remove('notification-visible');
                notif.classList.add('notification-hidden');
            }, 3000);
        }

        function escapeHtml(unsafe) {
            if (typeof unsafe !== 'string') return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
